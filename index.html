<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 演示</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="upload-screen">
    <div id="drop-zone">
      <div class="upload-icon">&#128196;</div>
      <p class="upload-title">拖拽 PDF 文件到此处</p>
      <p class="upload-sub">或</p>
      <label for="file-input" class="btn">选择文件</label>
      <input type="file" id="file-input" accept=".pdf" hidden>
    </div>
  </div>

  <div id="presentation-screen">
    <div id="sidebar">
      <div id="thumbnails"></div>
    </div>
    <div id="main-area">
      <div id="slide-container">
        <canvas id="main-canvas"></canvas>
        <canvas id="draw-canvas"></canvas>
        <button id="floating-toggle">🎨</button>
        <div id="floating-toolbar">
          <button class="ftool-btn" data-tool="pen" title="画笔 (P)">🖊️</button>
          <button class="ftool-btn" data-tool="eraser" title="橡皮擦 (E)">🧹</button>
          <button class="ftool-btn" data-tool="laser" title="激光笔 (L)">🔴</button>
          <div class="ftool-sep"></div>
          <input type="color" id="fcolor-picker" value="#ff3b30" title="颜色">
          <input type="range" id="fsize-slider" min="2" max="20" value="3" title="粗细" orient="vertical">
          <div class="ftool-sep"></div>
          <button class="ftool-btn" data-action="clear" title="清空 (C)">🗑️</button>
        </div>
      </div>
      <div id="toolbar">
        <button class="tool-btn" id="pen-btn" title="画笔 (P)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/>
          </svg>
        </button>
        <button class="tool-btn" id="eraser-btn" title="橡皮擦 (E)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 20H7L3 16l10-10 8 8-1 6z"/><path d="M16 2l6 6"/>
          </svg>
        </button>
        <button class="tool-btn" id="laser-btn" title="激光笔 (L)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M1 12h6m6 0h6"/>
          </svg>
        </button>
        <div class="tool-sep"></div>
        <input type="color" id="color-picker" value="#ff3b30" title="颜色">
        <input type="range" id="size-slider" min="2" max="20" value="3" title="粗细">
        <div class="tool-sep"></div>
        <button class="tool-btn" id="undo-btn" title="撤销 (Ctrl+Z)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-9 9"/>
          </svg>
        </button>
        <button class="tool-btn" id="clear-btn" title="清空 (C)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
        </button>
      </div>
      <div id="controls">
        <button class="nav-btn" id="prev-btn" title="上一页 (←)">&#8592;</button>
        <span id="page-info">1 / 1</span>
        <button class="nav-btn" id="next-btn" title="下一页 (→)">&#8594;</button>
        <div class="ctrl-sep"></div>
        <button class="nav-btn" id="fullscreen-btn" title="全屏播放 (F5)">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M1 5V1h4M10 1h4v4M14 10v4h-4M5 14H1v-4"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="fullscreen-hint">ESC 退出 &nbsp;·&nbsp; ← → 切换页面 &nbsp;·&nbsp; 点击左右翻页</div>
  </div>

  <script src="libs/pdf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
